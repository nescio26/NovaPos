<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>NovaPos</title>
    <meta
      name="description"
      content="Premium Point of Sale and Kitchen Management System"
    />

    <link
      rel="icon"
      type="image/png"
      href="/favicon-96x96.png?v=20260401"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260401" />
    <link rel="shortcut icon" href="/favicon.ico?v=20260401" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png?v=20260401"
    />
    <meta name="apple-mobile-web-app-title" content="NovaPos" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="manifest" href="/site.webmanifest?v=20260401" />
    <meta name="theme-color" content="#FF5C00" />

    <script>
      (function () {
        try {
          const theme = localStorage.getItem("theme");
          const supportDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          if (theme === "dark" || (!theme && supportDark)) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-[#F8F9FD] dark:bg-[#0B0E11] transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
